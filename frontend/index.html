<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Property listing launch schedule" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Manrope:wght@400;500;600&family=Barlow+Condensed:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <title>Listing Schedule</title>
    <style>
      #app-loading {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        font-family: Manrope, system-ui, sans-serif;
        color: #52525b;
        background: #fff;
        padding: 2rem;
        text-align: center;
      }
      #app-loading strong {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 500;
        color: #18181b;
        font-size: 1.125rem;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading" role="status" aria-live="polite">
        <strong>Loading schedule…</strong>
        <span style="font-size: 0.875rem">First visit after idle may take up to a minute on the free host.</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
